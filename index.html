<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="styling/styles.css">
    <script src="./build/bundle.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<div class="history-container" id="history-container">
    <span class="history-item --add" id="new-session">New Chat</span>
</div>
<div class="main-container">
    <div class="navigator">
        <!-- Navigator stuff -->
        <div class="menu-item --history" id="chat-history">
            <span class="menu-expand-segment"></span>
            <span class="menu-expand-segment"></span>
            <span class="menu-expand-segment"></span>
        </div>
        <div class="voice-indicators"></div>
        <div class="menu-item --config"></div>
    </div>
    <div class="inner-container" id="message-container">
    </div>
    <div class="input-container">
        <textarea class="inputbox" id="regular-input" placeholder="Say something..."></textarea>
        <svg class="microphone" version="1.1" viewBox="0 0 24 24" xml:space="preserve"
             xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.5,10L20.5,10c-0.8,0-1.5,0.7-1.5,1.5v0.3c0,3.6-2.6,6.7-6.1,7.2C8.7,19.5,5,16.2,5,12l0-0.5C5,10.7,4.3,10,3.5,10    C2.7,10,2,10.7,2,11.5L2,12c0,4.8,3,8.9,8,9.8V22c0,1.1,0.9,2,2,2s2-0.9,2-2v-0.2c5-1,8-5.3,8-10.1v-0.2C22,10.7,21.3,10,20.5,10z    "/>
            <path class="microphone-state"
                    d="M12,16c2.8,0,5-2.2,5-5V5c0-2.8-2.2-5-5-5S7,2.2,7,5v6C7,13.8,9.2,16,12,16z"/></svg>
    </div>
</div>
</body>
</html>
